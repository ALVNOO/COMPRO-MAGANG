<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;font-size:14px;font-weight:600;border-radius:12px;border:none;cursor:pointer;font-family:inherit;line-height:1.25;text-decoration:none;transition:all .3s cubic-bezier(.4,0,.2,1)}
  .btn-primary{background:linear-gradient(135deg,#EE2E24 0%,#C41E1A 100%);color:#fff;box-shadow:0 4px 14px rgba(238,46,36,.25)}
  .btn-secondary{background:#fff;color:#4B5563;border:1px solid #D1D5DB;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .btn-outline{background:transparent;color:#EE2E24;border:2px solid #EE2E24}
  .btn-ghost{background:transparent;color:#6B7280}
  .btn-danger{background:#DC2626;color:#fff}
  .btn-success{background:linear-gradient(135deg,#059669 0%,#047857 100%);color:#fff}
</style></head>
<body><div class="card-frame" style="justify-content:center;background:#F9FAFB">
  <div class="row" style="gap:14px;justify-content:center">
    <button class="btn btn-primary"><i class="fas fa-plus"></i>Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-outline">Outline</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-success"><i class="fas fa-check"></i>Success</button>
  </div>
</div></body></html>
