<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame" style="background:#F9FAFB;justify-content:center;gap:16px;flex-direction:row;align-items:stretch">
  <div style="flex:1;background:#fff;border:1px solid #E5E7EB;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);overflow:hidden">
    <div style="padding:20px 24px;border-bottom:1px solid #E5E7EB"><div style="font-size:16px;font-weight:600">Default card</div></div>
    <div style="padding:20px 24px;font-size:14px;color:#4B5563;line-height:1.6">White surface, hairline border, soft resting shadow. Hover bumps to <span class="mono">shadow-md</span>.</div>
    <div style="padding:14px 24px;background:#F9FAFB;border-top:1px solid #E5E7EB;font-size:13px;color:#6B7280">Footer area</div>
  </div>
  <div style="flex:1;background:#fff;border-radius:16px;box-shadow:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);overflow:hidden">
    <div style="padding:20px 24px;border-bottom:1px solid #E5E7EB"><div style="font-size:16px;font-weight:600">Elevated card</div></div>
    <div style="padding:20px 24px;font-size:14px;color:#4B5563;line-height:1.6">No border, deeper shadow. Hover translates <span class="mono">-4px Y</span> with <span class="mono">shadow-xl</span>.</div>
  </div>
</div></body></html>
