<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div>
      <div style="height:64px;border-radius:12px;background:linear-gradient(135deg,#EE2E24 0%,#C41E1A 100%);box-shadow:0 4px 14px rgba(238,46,36,.25)"></div>
      <div style="font-size:12px;font-weight:600;margin-top:8px">gradient-primary</div>
      <div class="mono">135° · EE2E24 → C41E1A</div>
    </div>
    <div>
      <div style="height:64px;border-radius:12px;background:linear-gradient(180deg,#1A1A1A 0%,#2D2D2D 100%)"></div>
      <div style="font-size:12px;font-weight:600;margin-top:8px">gradient-dark</div>
      <div class="mono">180° · 1A1A1A → 2D2D2D</div>
    </div>
    <div>
      <div style="height:64px;border-radius:12px;background:linear-gradient(135deg,#059669 0%,#047857 100%)"></div>
      <div style="font-size:12px;font-weight:600;margin-top:8px">gradient-success</div>
      <div class="mono">135° · 059669 → 047857</div>
    </div>
  </div>
</div></body></html>
