<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px">
    <div class="sw"><div class="chip" style="background:#1A1A1A"></div><span class="name">black</span><span>#1A1A1A</span></div>
    <div class="sw"><div class="chip" style="background:#231F20"></div><span class="name">gray-900</span><span>#231F20</span></div>
    <div class="sw"><div class="chip" style="background:#374151"></div><span class="name">gray-800</span><span>#374151</span></div>
    <div class="sw"><div class="chip" style="background:#4B5563"></div><span class="name">gray-700</span><span>#4B5563</span></div>
    <div class="sw"><div class="chip" style="background:#6B7280"></div><span class="name">gray-600</span><span>#6B7280</span></div>
    <div class="sw"><div class="chip" style="background:#9CA3AF"></div><span class="name">gray-500</span><span>#9CA3AF</span></div>
    <div class="sw"><div class="chip" style="background:#C7C8CA"></div><span class="name">gray-400</span><span>#C7C8CA</span></div>
    <div class="sw"><div class="chip" style="background:#D1D5DB"></div><span class="name">gray-300</span><span>#D1D5DB</span></div>
    <div class="sw"><div class="chip" style="background:#E5E7EB"></div><span class="name">gray-200</span><span>#E5E7EB</span></div>
    <div class="sw"><div class="chip" style="background:#F3F4F6"></div><span class="name">gray-100</span><span>#F3F4F6</span></div>
    <div class="sw"><div class="chip" style="background:#F9FAFB"></div><span class="name">gray-50</span><span>#F9FAFB</span></div>
    <div class="sw"><div class="chip" style="background:#fff;border:1px solid #e5e7eb"></div><span class="name">white</span><span>#FFFFFF</span></div>
  </div>
</div></body></html>
