<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px">
    <div class="sw"><div class="chip" style="background:#EE2E24"></div><span class="name">primary</span><span>#EE2E24</span></div>
    <div class="sw"><div class="chip" style="background:#FF4D45"></div><span class="name">primary-light</span><span>#FF4D45</span></div>
    <div class="sw"><div class="chip" style="background:#C41E1A"></div><span class="name">primary-dark</span><span>#C41E1A</span></div>
    <div class="sw"><div class="chip" style="background:rgba(238,46,36,.2);border:1px solid #eee"></div><span class="name">primary-200</span><span>20%</span></div>
    <div class="sw"><div class="chip" style="background:rgba(238,46,36,.1);border:1px solid #eee"></div><span class="name">primary-100</span><span>10%</span></div>
    <div class="sw"><div class="chip" style="background:rgba(238,46,36,.05);border:1px solid #eee"></div><span class="name">primary-50</span><span>5%</span></div>
  </div>
</div></body></html>
