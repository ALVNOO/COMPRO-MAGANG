<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <div>
      <div style="display:flex;gap:6px"><div style="flex:2;height:56px;border-radius:10px;background:#059669"></div><div style="flex:1;height:56px;border-radius:10px;background:#D1FAE5"></div></div>
      <div style="font-size:12px;font-weight:600;margin-top:6px">Success</div>
      <div class="mono">#059669 · #D1FAE5</div>
    </div>
    <div>
      <div style="display:flex;gap:6px"><div style="flex:2;height:56px;border-radius:10px;background:#D97706"></div><div style="flex:1;height:56px;border-radius:10px;background:#FEF3C7"></div></div>
      <div style="font-size:12px;font-weight:600;margin-top:6px">Warning</div>
      <div class="mono">#D97706 · #FEF3C7</div>
    </div>
    <div>
      <div style="display:flex;gap:6px"><div style="flex:2;height:56px;border-radius:10px;background:#DC2626"></div><div style="flex:1;height:56px;border-radius:10px;background:#FEE2E2"></div></div>
      <div style="font-size:12px;font-weight:600;margin-top:6px">Danger</div>
      <div class="mono">#DC2626 · #FEE2E2</div>
    </div>
    <div>
      <div style="display:flex;gap:6px"><div style="flex:2;height:56px;border-radius:10px;background:#0891B2"></div><div style="flex:1;height:56px;border-radius:10px;background:#CFFAFE"></div></div>
      <div style="font-size:12px;font-weight:600;margin-top:6px">Info</div>
      <div class="mono">#0891B2 · #CFFAFE</div>
    </div>
  </div>
</div></body></html>
