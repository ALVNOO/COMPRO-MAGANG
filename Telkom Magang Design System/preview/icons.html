<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:14px;font-size:11px;color:#6B7280">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-clock" style="font-size:22px;color:#231F20"></i>fa-clock</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-check-circle" style="font-size:22px;color:#059669"></i>fa-check-circle</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-times-circle" style="font-size:22px;color:#DC2626"></i>fa-times-circle</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-exclamation-triangle" style="font-size:22px;color:#D97706"></i>fa-exclamation-triangle</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-info-circle" style="font-size:22px;color:#0891B2"></i>fa-info-circle</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-bell" style="font-size:22px;color:#231F20"></i>fa-bell</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-user" style="font-size:22px;color:#231F20"></i>fa-user</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-users" style="font-size:22px;color:#231F20"></i>fa-users</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-building" style="font-size:22px;color:#231F20"></i>fa-building</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-sitemap" style="font-size:22px;color:#231F20"></i>fa-sitemap</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-file-alt" style="font-size:22px;color:#231F20"></i>fa-file-alt</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-calendar-check" style="font-size:22px;color:#231F20"></i>fa-calendar-check</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-book" style="font-size:22px;color:#231F20"></i>fa-book</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-flag-checkered" style="font-size:22px;color:#231F20"></i>fa-flag-checkered</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-play" style="font-size:22px;color:#231F20"></i>fa-play</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i class="fas fa-chart-line" style="font-size:22px;color:#231F20"></i>fa-chart-line</div>
  </div>
  <div class="mono" style="margin-top:6px;text-align:right">Font Awesome 6 · solid style</div>
</div></body></html>
