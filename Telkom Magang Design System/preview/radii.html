<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #fff; }
  .card-frame { padding: 28px 30px; gap: 0; justify-content: center; }
  .strip { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; flex: 1; }

  /* The radius specimen — a large tile filled with the brand red, generously sized so the
     curvature reads at a glance. Token + px value sit prominently below. */
  .tile { width: 100%; aspect-ratio: 1; max-width: 96px; background: linear-gradient(135deg, #EE2E24, #C41E1A); box-shadow: 0 6px 16px rgba(238,46,36,.18); }
  .r-sm   { border-radius: 4px; }
  .r-md   { border-radius: 8px; }
  .r-lg   { border-radius: 12px; }
  .r-xl   { border-radius: 16px; }
  .r-2xl  { border-radius: 24px; }
  .r-full { border-radius: 9999px; }

  .name { font-size: 14px; font-weight: 700; color: #231F20; letter-spacing: -.01em; }
  .px { font-family: var(--font-mono); font-size: 12px; color: #9CA3AF; margin-top: -10px; }
  .use { font-size: 11px; color: #6B7280; text-align: center; line-height: 1.45; padding: 0 4px; }

  .divider { height: 1px; background: #E5E7EB; margin: 22px 0 18px; }
</style></head>
<body><div class="card-frame">

  <div class="strip">
    <div class="item">
      <div class="tile r-sm"></div>
      <div class="name">sm</div>
      <div class="px">4 px</div>
      <div class="use">tags · code chips</div>
    </div>
    <div class="item">
      <div class="tile r-md"></div>
      <div class="name">md</div>
      <div class="px">8 px</div>
      <div class="use">small inputs · dropdown items</div>
    </div>
    <div class="item">
      <div class="tile r-lg"></div>
      <div class="name">lg</div>
      <div class="px">12 px</div>
      <div class="use">buttons · alerts · dropdown menu</div>
    </div>
    <div class="item">
      <div class="tile r-xl"></div>
      <div class="name">xl</div>
      <div class="px">16 px</div>
      <div class="use">cards · stat cards · form inputs</div>
    </div>
    <div class="item">
      <div class="tile r-2xl"></div>
      <div class="name">2xl</div>
      <div class="px">24 px</div>
      <div class="use">glass cards · hero · modal</div>
    </div>
    <div class="item">
      <div class="tile r-full"></div>
      <div class="name">full</div>
      <div class="px">9999 px</div>
      <div class="use">pills · badges · avatars</div>
    </div>
  </div>

</div></body></html>
