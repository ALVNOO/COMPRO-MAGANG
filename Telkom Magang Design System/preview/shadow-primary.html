<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame" style="background:#F9FAFB;justify-content:center;align-items:center;gap:40px;flex-direction:row">
  <div style="text-align:center">
    <button style="padding:14px 32px;border:none;border-radius:12px;background:linear-gradient(135deg,#EE2E24 0%,#C41E1A 100%);color:white;font-weight:600;font-size:14px;font-family:inherit;box-shadow:0 4px 14px rgba(238,46,36,.25);cursor:pointer">Resting state</button>
    <div class="mono" style="margin-top:10px">0 4px 14px rgba(238,46,36,.25)</div>
  </div>
  <div style="text-align:center">
    <button style="padding:14px 32px;border:none;border-radius:12px;background:linear-gradient(135deg,#FF4D45 0%,#EE2E24 100%);color:white;font-weight:600;font-size:14px;font-family:inherit;box-shadow:0 10px 25px rgba(238,46,36,.3);cursor:pointer;transform:translateY(-2px)">Hover · -2px lift</button>
    <div class="mono" style="margin-top:10px">0 10px 25px rgba(238,46,36,.3)</div>
  </div>
</div></body></html>
