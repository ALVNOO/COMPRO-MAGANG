<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame" style="background:#F9FAFB">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:20px;padding:20px 0">
    <div style="text-align:center"><div style="height:56px;background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.05)"></div><div style="font-size:11px;font-weight:600;margin-top:10px">xs</div></div>
    <div style="text-align:center"><div style="height:56px;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)"></div><div style="font-size:11px;font-weight:600;margin-top:10px">sm · card</div></div>
    <div style="text-align:center"><div style="height:56px;background:#fff;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06)"></div><div style="font-size:11px;font-weight:600;margin-top:10px">md · hover</div></div>
    <div style="text-align:center"><div style="height:56px;background:#fff;border-radius:12px;box-shadow:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05)"></div><div style="font-size:11px;font-weight:600;margin-top:10px">lg · modal</div></div>
    <div style="text-align:center"><div style="height:56px;background:#fff;border-radius:12px;box-shadow:0 20px 25px rgba(0,0,0,.1),0 10px 10px rgba(0,0,0,.04)"></div><div style="font-size:11px;font-weight:600;margin-top:10px">xl · float</div></div>
  </div>
</div></body></html>
