<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .sb{background:linear-gradient(180deg,#1A1A1A,#2D2D2D);color:#fff;padding:18px 14px;width:260px;border-radius:14px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;color:rgba(255,255,255,.7);border-radius:12px;font-weight:500;font-size:14px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);margin:4px 0}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
  .nav-item.active{background:linear-gradient(135deg,#EE2E24,#C41E1A);color:#fff;transform:translateX(4px)}
  .nav-icon{width:20px;text-align:center}
</style></head>
<body><div class="card-frame" style="background:#F9FAFB;flex-direction:row;justify-content:center;align-items:center;gap:20px">
  <div class="sb">
    <div style="display:flex;align-items:center;gap:10px;padding:6px 10px 16px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px">
      <div style="width:36px;height:36px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center"><img src="../assets/logos/telkom-mark.png" style="width:24px;height:24px;object-fit:contain"></div>
      <div style="font-size:15px;font-weight:700">Telkom Magang</div>
    </div>
    <div class="nav-item active"><span class="nav-icon"><i class="fas fa-home"></i></span>Dashboard</div>
    <div class="nav-item"><span class="nav-icon"><i class="fas fa-file-alt"></i></span>Pengajuan</div>
    <div class="nav-item"><span class="nav-icon"><i class="fas fa-calendar-check"></i></span>Presensi</div>
    <div class="nav-item"><span class="nav-icon"><i class="fas fa-book"></i></span>Logbook</div>
  </div>
  <div style="font-size:13px;color:#6B7280;max-width:240px;line-height:1.6">
    <div style="font-weight:600;color:#231F20;margin-bottom:8px">Sidebar navigation</div>
    Dark gradient surface. Active state uses the full red <span class="mono">--gradient-primary</span>, white text, and a <span class="mono">+4px X</span> translate. Hover gets a subtle 5% white tint.
  </div>
</div></body></html>
