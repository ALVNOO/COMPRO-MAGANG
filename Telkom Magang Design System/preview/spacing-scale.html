<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-frame">
  <div style="display:grid;grid-template-columns:auto 1fr;column-gap:24px;row-gap:8px;align-items:baseline">
    <div class="mono">--space-1</div><div style="display:flex;align-items:center;gap:12px"><div style="width:4px;height:14px;background:#EE2E24"></div><span class="mono">4px</span></div>
    <div class="mono">--space-2</div><div style="display:flex;align-items:center;gap:12px"><div style="width:8px;height:14px;background:#EE2E24"></div><span class="mono">8px</span></div>
    <div class="mono">--space-3</div><div style="display:flex;align-items:center;gap:12px"><div style="width:12px;height:14px;background:#EE2E24"></div><span class="mono">12px</span></div>
    <div class="mono">--space-4</div><div style="display:flex;align-items:center;gap:12px"><div style="width:16px;height:14px;background:#EE2E24"></div><span class="mono">16px · default</span></div>
    <div class="mono">--space-6</div><div style="display:flex;align-items:center;gap:12px"><div style="width:24px;height:14px;background:#EE2E24"></div><span class="mono">24px · card padding</span></div>
    <div class="mono">--space-8</div><div style="display:flex;align-items:center;gap:12px"><div style="width:32px;height:14px;background:#EE2E24"></div><span class="mono">32px · section</span></div>
    <div class="mono">--space-12</div><div style="display:flex;align-items:center;gap:12px"><div style="width:48px;height:14px;background:#EE2E24"></div><span class="mono">48px</span></div>
    <div class="mono">--space-16</div><div style="display:flex;align-items:center;gap:12px"><div style="width:64px;height:14px;background:#EE2E24"></div><span class="mono">64px</span></div>
    <div class="mono">--space-24</div><div style="display:flex;align-items:center;gap:12px"><div style="width:96px;height:14px;background:#EE2E24"></div><span class="mono">96px</span></div>
  </div>
</div></body></html>
