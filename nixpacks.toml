providers = ["node", "php"]

[variables]
NIXPACKS_PHP_FPM_CONF = "true"

[phases.setup]
aptPkgs = ["libpng-dev", "libjpeg-dev", "libfreetype6-dev", "libzip-dev", "libonig-dev", "libxml2-dev", "zip", "unzip"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan storage:link || true && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
